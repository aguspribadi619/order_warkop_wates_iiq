<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Warkop Sejagat</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f5f5;color:#1a1a1a}
.header{background:#1a5c2a;color:white;padding:16px;text-align:center;position:sticky;top:0;z-index:10}
.header h1{font-size:18px;font-weight:600}
.header p{font-size:12px;opacity:.8;margin-top:2px}
.tabs{display:flex;background:white;border-bottom:1px solid #e5e5e5;overflow-x:auto;position:sticky;top:56px;z-index:9}
.tab{padding:10px 14px;font-size:12px;cursor:pointer;color:#666;border:none;border-bottom:2px solid transparent;white-space:nowrap;background:none}
.tab.active{color:#1a5c2a;border-bottom-color:#1a5c2a;font-weight:500}
.ks{padding:12px 12px 0}
.kl{font-size:10px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.mi{display:flex;align-items:flex-start;gap:10px;padding:10px;background:white;border:1px solid #e8e8e8;border-radius:8px;margin-bottom:6px}
.mi.hbs{opacity:.4;pointer-events:none}
.mn{flex:1;min-width:0}
.nm{font-size:13px;font-weight:500}
.mh{font-size:12px;color:#666;margin-top:2px}
.mh b{color:#1a5c2a}
.bh{font-size:9px;background:#fee2e2;color:#dc2626;padding:2px 6px;border-radius:4px;margin-left:6px;vertical-align:middle}
.qc{display:flex;align-items:center;gap:6px;flex-shrink:0;margin-top:2px}
.qb{width:26px;height:26px;border:1px solid #d1d5db;border-radius:6px;background:white;font-size:16px;cursor:pointer}
.qn{font-size:14px;font-weight:500;min-width:20px;text-align:center}
.vs{font-size:11px;padding:3px 6px;border:1px solid #e5e5e5;border-radius:4px;background:white;margin-top:5px;width:100%}
.ci{width:100%;padding:5px 8px;border:1px solid #e5e5e5;border-radius:4px;font-size:11px;background:white;margin-top:4px;resize:none;font-family:inherit}
.cart-bar{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid #e5e5e5;padding:12px;display:none;gap:10px;align-items:center;z-index:20;box-shadow:0 -2px 8px rgba(0,0,0,.08)}
.cart-bar.show{display:flex}
.cart-info{flex:1}
.cart-info p{font-size:12px;color:#666}
.cart-info strong{font-size:15px;font-weight:600}
.bg{background:#1a5c2a;color:white;border:none;padding:10px 18px;border-radius:8px;font-size:13px;cursor:pointer;font-weight:500;white-space:nowrap}
.bo{background:white;color:#1a5c2a;border:1px solid #1a5c2a;padding:10px 14px;border-radius:8px;font-size:13px;cursor:pointer;white-space:nowrap}
.page{display:none;padding-bottom:80px}
.page.active{display:block}
.cw{padding:12px}
.checkout-card{background:white;border:1px solid #e8e8e8;border-radius:10px;padding:14px;margin-bottom:12px}
.checkout-card h3{font-size:13px;color:#888;font-weight:500;margin-bottom:10px}
.ci2{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-bottom:1px solid #f3f4f6}
.ci2:last-child{border-bottom:none}
.cin{font-size:13px}
.cid{font-size:11px;color:#888;margin-top:1px}
.cip{font-size:13px;font-weight:500;flex-shrink:0;margin-left:8px}
.ctot{display:flex;justify-content:space-between;padding-top:10px;margin-top:6px;border-top:1px solid #e5e5e5;font-weight:600;font-size:15px}
.ig{margin-bottom:10px}
.ig label{display:block;font-size:12px;color:#666;margin-bottom:5px;font-weight:500}
.ig input{width:100%;padding:9px 12px;border:1px solid #e5e5e5;border-radius:8px;font-size:13px;background:white}
.staff-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.sc{border:1px solid #e5e5e5;border-radius:8px;padding:10px;cursor:pointer;background:white;text-align:center}
.sc.selected{border-color:#1a5c2a;background:#f0faf3}
.sc.offline{opacity:.4;pointer-events:none}
.sn{font-size:13px;font-weight:500}
.ss{font-size:11px;color:#888;margin-top:4px;display:flex;align-items:center;justify-content:center;gap:4px}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.dot.green{background:#16a34a}.dot.red{background:#dc2626}
.nb{display:flex;align-items:center;gap:6px;padding:12px;cursor:pointer;color:#1a5c2a;font-size:13px;font-weight:500;background:white;border-bottom:1px solid #e5e5e5}
.loading{text-align:center;padding:40px 20px;color:#888;font-size:14px}
.qw{padding:20px;text-align:center}
.qi{max-width:280px;width:100%;border:1px solid #e5e5e5;border-radius:12px}
.qno{font-size:12px;color:#888;margin-top:10px;line-height:1.5}
.bf{width:100%;padding:12px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;margin-top:4px}
</style>
</head>
<body>
<div id="page-menu" class="page active">
  <div class="header"><h1>Warkop Sejagat</h1><p>Pesan Antar Khusus Pesantren IIQ</p></div>
  <div class="tabs">
    <button class="tab active" onclick="filterKat(null,this)">Semua</button>
    <button class="tab" onclick="filterKat('Aneka Kopi',this)">Kopi</button>
    <button class="tab" onclick="filterKat('Minuman Lain',this)">Minuman</button>
    <button class="tab" onclick="filterKat('Aneka Indomie',this)">Indomie</button>
    <button class="tab" onclick="filterKat('Menu Promo',this)">Promo</button>
    <button class="tab" onclick="filterKat('other',this)">Lainnya</button>
  </div>
  <div id="menu-list"><div class="loading">Memuat menu...</div></div>
  <div class="cart-bar" id="cb">
    <div class="cart-info"><p id="cc">0 item</p><strong id="ct">Rp 0</strong></div>
    <button class="bo" onclick="showPage('page-qris','page-menu')">Lihat QRIS</button>
    <button class="bg" onclick="goCheckout()">Pesan</button>
  </div>
</div>

<div id="page-qris" class="page">
  <div class="nb" onclick="goBack()">&#8592; Kembali</div>
  <div class="header"><h1>Pembayaran QRIS</h1><p>Warkop Sejagat 2 NP</p></div>
  <div class="qw">
    <img class="qi" src="qris.jpg" alt="QRIS" loading="lazy">
    <p class="qno">Scan QR dengan e-wallet atau m-banking<br>NMID: ID1025419357831</p>
  </div>
</div>

<div id="page-checkout" class="page">
  <div class="nb" onclick="goBack()">&#8592; Kembali ke menu</div>
  <div class="header"><h1>Konfirmasi Pesanan</h1></div>
  <div class="cw">
    <div id="co-items"></div>
    <div class="checkout-card">
      <h3>Kirim ke</h3>
      <div class="staff-grid" id="staff-grid"><div class="loading">Memuat...</div></div>
      <div class="ig"><label>Nama kamu</label><input type="text" id="nama-user" placeholder="Tulis nama kamu..."></div>
      <button class="bg bf" onclick="kirim()">Kirim via WhatsApp</button>
    </div>
  </div>
</div>

<script>

var GAS = 'https://script.google.com/macros/s/AKfycbzFhpSpDuQmz2QpfPHHOsKNWeDnA1QTRTFPT72UXk2S6IAdId3gTnr08C1Zt-dpVdDN/exec';
var allMenu = [];
var allStaff = [];
var cart = {};
var activeKat = null;
var prevPage = 'page-menu';
var selectedStaff = null;

function fmt(n) {
  return Number(n || 0).toLocaleString('id-ID');
}

function esc(v) {
  return String(v ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function loadJSON(action, cb) {
  var name = '_cb_' + action + '_' + Date.now() + '_' + Math.floor(Math.random() * 9999);
  var el = document.createElement('script');

  var timeout = setTimeout(function() {
    try { delete window[name]; el.parentNode && el.parentNode.removeChild(el); } catch(e) {}
    cb(new Error('Timeout saat memuat ' + action));
  }, 20000);

  window[name] = function(data) {
    clearTimeout(timeout);
    try { delete window[name]; el.parentNode && el.parentNode.removeChild(el); } catch(e) {}
    cb(null, data);
  };

  el.onerror = function() {
    clearTimeout(timeout);
    try { delete window[name]; el.parentNode && el.parentNode.removeChild(el); } catch(e) {}
    cb(new Error('Network error saat memuat ' + action));
  };

  el.src = GAS + '?action=' + encodeURIComponent(action) + '&callback=' + encodeURIComponent(name) + '&t=' + Date.now();
  document.head.appendChild(el);
}

function init() {
  loadJSON('getMenu', function(e, d) {
    if (e) {
      document.getElementById('menu-list').innerHTML = '<div class="loading" style="color:red">Gagal memuat menu: ' + esc(e.message) + '</div>';
      return;
    }

    allMenu = Array.isArray(d) ? d : [];
    renderCurrentMenu();
  });

  loadJSON('getStaff', function(e, d) {
    if (e) {
      allStaff = [];
      return;
    }

    allStaff = Array.isArray(d) ? d : [];
  });
}

function getFilteredMenu() {
  var other = ['Aneka Kopi', 'Minuman Lain', 'Aneka Indomie', 'Menu Promo'];

  if (activeKat === null) return allMenu;
  if (activeKat === 'other') {
    return allMenu.filter(function(m) {
      return !other.includes(m.kategori);
    });
  }
  return allMenu.filter(function(m) {
    return m.kategori === activeKat;
  });
}

function renderCurrentMenu() {
  renderMenu(getFilteredMenu());
}

function filterKat(kat, el) {
  activeKat = kat;
  document.querySelectorAll('.tab').forEach(function(t) {
    t.classList.remove('active');
  });
  if (el) el.classList.add('active');
  renderCurrentMenu();
}

function getQtyByMenuId(id) {
  var total = 0;
  Object.values(cart).forEach(function(c) {
    if (String(c.menu.id) === String(id)) total += c.qty;
  });
  return total;
}

function getSelectedSuhu(id, hp, hd) {
  var el = document.getElementById('s' + id);
  if (el) return el.value;
  if (hp) return 'Panas';
  if (hd) return 'Dingin';
  return '';
}

function getHargaBySuhu(menu, suhu) {
  var hp = Number(menu.harga_panas) || 0;
  var hd = Number(menu.harga_dingin) || 0;

  if (suhu === 'Panas') return hp;
  if (suhu === 'Dingin') return hd;
  return hd || hp || 0;
}

function getCartKey(menu, suhu) {
  return String(menu.id) + '__' + String(suhu || 'default');
}

function renderMenu(items) {
  var groups = {};

  items.forEach(function(m) {
    var kat = m.kategori || 'Lainnya';
    if (!groups[kat]) groups[kat] = [];
    groups[kat].push(m);
  });

  var html = '';

  for (var kat in groups) {
    html += '<div class="ks"><div class="kl">' + esc(kat) + '</div>';

    groups[kat].forEach(function(m) {
      var id = m.id;
      var qty = getQtyByMenuId(id);
      var hp = Number(m.harga_panas) || 0;
      var hd = Number(m.harga_dingin) || 0;
      var hl = '';
      var suhuSelect = '';

      if (hp && hd) {
        hl = 'Panas <b>Rp ' + fmt(hp) + '</b> - Dingin <b>Rp ' + fmt(hd) + '</b>';
        suhuSelect = '<select class="vs" id="s' + esc(id) + '">'
          + '<option value="Panas">Pilih: Panas - Rp ' + fmt(hp) + '</option>'
          + '<option value="Dingin">Pilih: Dingin - Rp ' + fmt(hd) + '</option>'
          + '</select>';
      } else if (hp) {
        hl = '<b>Rp ' + fmt(hp) + '</b>';
      } else if (hd) {
        hl = '<b>Rp ' + fmt(hd) + '</b>';
      } else {
        hl = '<b>Rp 0</b>';
      }

      var vlist = Array.isArray(m.varian) ? m.varian : [];
      var varianSelect = vlist.length
        ? '<select class="vs" id="v' + esc(id) + '">' + vlist.map(function(v) {
            return '<option value="' + esc(v) + '">' + esc(v) + '</option>';
          }).join('') + '</select>'
        : '';

      var catatan = qty > 0
        ? '<textarea class="ci" id="c' + esc(id) + '" placeholder="Catatan untuk item ini..." rows="1" onchange="updateCatatan(' + esc(id) + ',this.value)"></textarea>'
        : '';

      html += '<div class="mi' + (m.tersedia ? '' : ' hbs') + '">'
        + '<div class="mn">'
        + '<div class="nm">' + esc(m.nama_menu) + (m.tersedia ? '' : '<span class="bh">Habis</span>') + '</div>'
        + '<div class="mh">' + hl + '</div>'
        + suhuSelect
        + varianSelect
        + catatan
        + '</div>'
        + '<div class="qc">'
        + (qty > 0 ? '<button class="qb" onclick="ubahQty(' + esc(id) + ',-1)">-</button><span class="qn">' + qty + '</span>' : '')
        + '<button class="qb" onclick="ubahQty(' + esc(id) + ',1)">+</button>'
        + '</div>'
        + '</div>';
    });

    html += '</div>';
  }

  document.getElementById('menu-list').innerHTML = html || '<div class="loading">Kosong</div>';
}

function ubahQty(id, d) {
  var m = null;

  for (var i = 0; i < allMenu.length; i++) {
    if (String(allMenu[i].id) === String(id)) {
      m = allMenu[i];
      break;
    }
  }

  if (!m) return;

  var hp = Number(m.harga_panas) || 0;
  var hd = Number(m.harga_dingin) || 0;
  var suhu = getSelectedSuhu(id, hp, hd);
  var harga = getHargaBySuhu(m, suhu);
  var key = getCartKey(m, suhu);
  var varianEl = document.getElementById('v' + id);
  var catatanEl = document.getElementById('c' + id);
  var varian = varianEl ? varianEl.value : (Array.isArray(m.varian) && m.varian.length ? m.varian[0] : '');
  var catatan = catatanEl ? catatanEl.value : '';

  if (!cart[key]) {
    cart[key] = {
      key: key,
      menu: m,
      qty: 0,
      suhu: suhu,
      harga: harga,
      varian: varian,
      catatan: catatan
    };
  }

  cart[key].harga = harga;
  cart[key].varian = varian;
  cart[key].catatan = catatan;
  cart[key].qty = Math.max(0, cart[key].qty + d);

  if (cart[key].qty === 0) delete cart[key];

  updateBar();
  renderCurrentMenu();
}

function updateCatatan(id, value) {
  var hp, hd, suhu, key;
  var m = allMenu.find(function(x) { return String(x.id) === String(id); });
  if (!m) return;

  hp = Number(m.harga_panas) || 0;
  hd = Number(m.harga_dingin) || 0;
  suhu = getSelectedSuhu(id, hp, hd);
  key = getCartKey(m, suhu);

  if (cart[key]) cart[key].catatan = value;
}

function updateBar() {
  var items = Object.values(cart);
  var total = 0;
  var count = 0;

  items.forEach(function(c) {
    total += Number(c.harga || 0) * c.qty;
    count += c.qty;
  });

  document.getElementById('cc').textContent = count + ' item';
  document.getElementById('ct').textContent = 'Rp ' + fmt(total);
  document.getElementById('cb').className = 'cart-bar' + (count > 0 ? ' show' : '');
}

function showPage(id, from) {
  if (from) prevPage = from;
  document.querySelectorAll('.page').forEach(function(p) {
    p.classList.remove('active');
  });
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function goBack() {
  showPage(prevPage);
}

function goCheckout() {
  var items = Object.values(cart);
  if (!items.length) return;

  var html = '<div class="checkout-card"><h3>Pesanan kamu</h3>';
  var total = 0;

  items.forEach(function(c) {
    var harga = Number(c.harga || 0);
    total += harga * c.qty;

    var det = [c.suhu, c.varian, c.catatan].filter(Boolean).join(' - ');

    html += '<div class="ci2">'
      + '<div><div class="cin">' + esc(c.menu.nama_menu) + '</div>'
      + (det ? '<div class="cid">' + esc(det) + '</div>' : '')
      + '</div>'
      + '<div class="cip">' + c.qty + 'x Rp ' + fmt(harga) + '</div>'
      + '</div>';
  });

  html += '<div class="ctot"><span>Total</span><span>Rp ' + fmt(total) + '</span></div></div>';
  document.getElementById('co-items').innerHTML = html;

  renderStaffGrid();
  selectedStaff = null;
  showPage('page-checkout', 'page-menu');
}

function renderStaffGrid() {
  var grid = document.getElementById('staff-grid');

  if (!allStaff.length) {
    grid.innerHTML = '<div class="loading">Data penerima belum termuat. Coba tunggu sebentar atau refresh.</div>';
    return;
  }

  var sg = '';

  allStaff.forEach(function(s, index) {
    sg += '<div class="sc' + (s.online ? '' : ' offline') + '" onclick="selStaff(this,' + index + ')">'
      + '<div class="sn">' + esc(s.nama) + '</div>'
      + '<div class="ss"><span class="dot ' + (s.online ? 'green' : 'red') + '"></span><span>' + (s.online ? 'Jaga' : 'Libur') + '</span></div>'
      + '</div>';
  });

  grid.innerHTML = sg;
}

function selStaff(el, index) {
  document.querySelectorAll('.sc').forEach(function(c) {
    c.classList.remove('selected');
  });

  el.classList.add('selected');
  selectedStaff = allStaff[index] || null;
}

function kirim() {
  var nama = document.getElementById('nama-user').value.trim();

  if (!nama) {
    alert('Isi nama dulu!');
    return;
  }

  if (!selectedStaff) {
    alert('Pilih penerima dulu!');
    return;
  }

  var items = Object.values(cart);
  var lines = '';
  var total = 0;

  items.forEach(function(c) {
    var harga = Number(c.harga || 0);
    total += harga * c.qty;

    var ket = [c.suhu, c.varian, c.catatan].filter(Boolean).join(', ');
    lines += '- ' + c.menu.nama_menu + ' - ' + c.qty + 'x - Rp ' + fmt(harga) + (ket ? ' (' + ket + ')' : '') + '
';
  });

  var pesan = '*Pesan Antar Khusus Pesantren IIQ:*

' + lines + '
*Total: Rp ' + fmt(total) + '*

Nama: ' + nama;

  window.open('https://wa.me/' + selectedStaff.nomor_wa + '?text=' + encodeURIComponent(pesan), '_blank');

  try {
    fetch(GAS, {
      method: 'POST',
      body: JSON.stringify({
        action: 'logOrder',
        nama_user: nama,
        staff_tujuan: selectedStaff.nama,
        total_harga: total,
        detail_pesanan: lines
      })
    });
  } catch(ex) {}
}

init();

</script>
</body>
</html>
