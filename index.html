<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warkop Sejagat - Pesan Antar</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f5f5;color:#1a1a1a}
.header{background:#1a5c2a;color:white;padding:16px;text-align:center;position:sticky;top:0;z-index:10}
.header h1{font-size:18px;font-weight:600}
.header p{font-size:12px;opacity:0.8;margin-top:2px}
.tabs{display:flex;background:white;border-bottom:1px solid #e5e5e5;overflow-x:auto;position:sticky;top:56px;z-index:9}
.tab{padding:10px 14px;font-size:12px;cursor:pointer;color:#666;border-bottom:2px solid transparent;white-space:nowrap;background:none;border-top:none;border-left:none;border-right:none}
.tab.active{color:#1a5c2a;border-bottom-color:#1a5c2a;font-weight:500}
.kategori-section{padding:12px 12px 0}
.kategori-label{font-size:10px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.menu-item{display:flex;align-items:flex-start;gap:10px;padding:10px;background:white;border:1px solid #e8e8e8;border-radius:8px;margin-bottom:6px}
.menu-item.habis{opacity:0.4;pointer-events:none}
.menu-info{flex:1;min-width:0}
.menu-nama{font-size:13px;font-weight:500;color:#1a1a1a}
.menu-harga{font-size:12px;color:#666;margin-top:2px}
.menu-harga b{color:#1a5c2a}
.badge-habis{font-size:9px;background:#fee2e2;color:#dc2626;padding:2px 6px;border-radius:4px;margin-left:6px;vertical-align:middle}
.qty-ctrl{display:flex;align-items:center;gap:6px;flex-shrink:0;margin-top:2px}
.qty-btn{width:26px;height:26px;border:1px solid #d1d5db;border-radius:6px;background:white;color:#1a1a1a;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.qty-btn:active{background:#f3f4f6}
.qty-num{font-size:14px;font-weight:500;min-width:20px;text-align:center}
.varian-select{font-size:11px;padding:3px 6px;border:1px solid #e5e5e5;border-radius:4px;color:#1a1a1a;background:white;margin-top:5px;width:100%}
.catatan-input{width:100%;padding:5px 8px;border:1px solid #e5e5e5;border-radius:4px;font-size:11px;color:#1a1a1a;background:white;margin-top:4px;resize:none;font-family:inherit}
.cart-bar{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid #e5e5e5;padding:12px;display:none;gap:10px;align-items:center;z-index:20;box-shadow:0 -2px 8px rgba(0,0,0,.08)}
.cart-bar.show{display:flex}
.cart-info{flex:1}
.cart-info p{font-size:12px;color:#666}
.cart-info strong{font-size:15px;color:#1a1a1a;font-weight:600}
.btn-green{background:#1a5c2a;color:white;border:none;padding:10px 18px;border-radius:8px;font-size:13px;cursor:pointer;font-weight:500;white-space:nowrap}
.btn-outline{background:white;color:#1a5c2a;border:1px solid #1a5c2a;padding:10px 14px;border-radius:8px;font-size:13px;cursor:pointer;white-space:nowrap}
.page{display:none;padding-bottom:80px}
.page.active{display:block}
.checkout-wrap{padding:12px}
.checkout-card{background:white;border:1px solid #e8e8e8;border-radius:10px;padding:14px;margin-bottom:12px}
.checkout-card h3{font-size:13px;color:#888;font-weight:500;margin-bottom:10px}
.checkout-item{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-bottom:1px solid #f3f4f6}
.checkout-item:last-child{border-bottom:none}
.checkout-item-name{font-size:13px;color:#1a1a1a}
.checkout-item-detail{font-size:11px;color:#888;margin-top:1px}
.checkout-item-price{text-align:right;font-size:13px;color:#1a1a1a;font-weight:500;flex-shrink:0;margin-left:8px}
.checkout-total{display:flex;justify-content:space-between;padding-top:10px;margin-top:6px;border-top:1px solid #e5e5e5;font-weight:600;font-size:15px}
.input-group{margin-bottom:10px}
.input-group label{display:block;font-size:12px;color:#666;margin-bottom:5px;font-weight:500}
.input-group input{width:100%;padding:9px 12px;border:1px solid #e5e5e5;border-radius:8px;font-size:13px;color:#1a1a1a;background:white}
.staff-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.staff-card{border:1px solid #e5e5e5;border-radius:8px;padding:10px;cursor:pointer;background:white;text-align:center}
.staff-card.selected{border-color:#1a5c2a;background:#f0faf3}
.staff-card.offline{opacity:0.4;pointer-events:none}
.staff-name{font-size:13px;font-weight:500;color:#1a1a1a}
.staff-status{font-size:11px;color:#888;margin-top:4px;display:flex;align-items:center;justify-content:center;gap:4px}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}
.dot.green{background:#16a34a}.dot.red{background:#dc2626}
.nav-back{display:flex;align-items:center;gap:6px;padding:12px;cursor:pointer;color:#1a5c2a;font-size:13px;font-weight:500;background:white;border-bottom:1px solid #e5e5e5}
.loading{text-align:center;padding:40px 20px;color:#888;font-size:14px}
.qris-wrap{padding:20px;text-align:center}
.qris-img{max-width:280px;width:100%;border:1px solid #e5e5e5;border-radius:12px;background:white}
.qris-note{font-size:12px;color:#888;margin-top:10px;line-height:1.5}
.btn-full{width:100%;padding:12px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;margin-top:4px}
</style>
</head>

  </div>
</div>

<script>
const GAS = 'https://script.google.com/macros/s/AKfycbzFhpSpDuQmz2QpfPHHOsKNWeDnA1QTRTFPT72UXk2S6IAdId3gTnr08C1Zt-dpVdDN/exec';
let allMenu=[], allStaff=[], cart={}, activeKat=null, prevPage='page-menu', selectedStaff=null;

// JSONP loader — solusi CORS untuk Google Apps Script
function jsonp(action) {
  return new Promise((resolve, reject) => {
    const cb = 'cb_' + Date.now() + Math.floor(Math.random()*9999);
    const script = document.createElement('script');
    window[cb] = function(data) {
      delete window[cb];
      document.body.removeChild(script);
      resolve(data);
    };
    script.onerror = () => { delete window[cb]; document.body.removeChild(script); reject(new Error('JSONP error')); };
    script.src = GAS + '?action=' + action + '&callback=' + cb;
    document.body.appendChild(script);
  });
}

async function init() {
  try {
    const [m, s] = await Promise.all([jsonp('getMenu'), jsonp('getStaff')]);
    allMenu = m; allStaff = s;
    renderMenu(allMenu);
  } catch(e) {
    document.getElementById('menu-list').innerHTML = '<div class="loading" style="color:#dc2626">⚠️ Gagal memuat menu.<br><small>' + e.message + '</small></div>';
  }
}

function filterKat(kat, el) {
  activeKat = kat;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  const other = ['Aneka Kopi','Minuman Lain','Aneka Indomie','Menu Promo'];
  const items = kat===null ? allMenu : kat==='other' ? allMenu.filter(m=>!other.includes(m.kategori)) : allMenu.filter(m=>m.kategori===kat);
  renderMenu(items);
}

function renderMenu(items) {
  const groups = {};
  items.forEach(m => { if(!groups[m.kategori]) groups[m.kategori]=[]; groups[m.kategori].push(m); });
  let html = '';
  for (const kat in groups) {
    html += '<div class="kategori-section"><div class="kategori-label">' + kat + '</div>';
    groups[kat].forEach(m => {
      const qty = cart[m.id]?.qty || 0;
      const hp = Number(m.harga_panas)||0, hd = Number(m.harga_dingin)||0;
      let hargaLabel = '';
      if (hp&&hd) hargaLabel = 'Panas <b>Rp '+fmt(hp)+'</b> &middot; Dingin <b>Rp '+fmt(hd)+'</b>';
      else if (hp) hargaLabel = '<b>Rp '+fmt(hp)+'</b>';
      else if (hd) hargaLabel = '<b>Rp '+fmt(hd)+'</b>';
      const varianEl = m.varian?.length ? '<select class="varian-select" id="varian-'+m.id+'" onchange="updateVarian('+m.id+',this.value)">'+m.varian.map(v=>'<option>'+v+'</option>').join('')+'</select>' : '';
      const catatanEl = qty>0 ? '<textarea class="catatan-input" id="catatan-'+m.id+'" placeholder="Catatan (opsional)..." rows="1" onchange="updateCatatan('+m.id+',this.value)"></textarea>' : '';
      const habisTag = !m.tersedia ? '<span class="badge-habis">Habis</span>' : '';
      html += '<div class="menu-item' + (!m.tersedia?' habis':'') + '">'
        + '<div class="menu-info">'
        + '<div class="menu-nama">' + m.nama_menu + habisTag + '</div>'
        + '<div class="menu-harga">' + hargaLabel + '</div>'
        + varianEl + catatanEl
        + '</div>'
        + '<div class="qty-ctrl">'
        + (qty>0 ? '<button class="qty-btn" onclick="changeQty('+m.id+',-1)">&#8722;</button><span class="qty-num">'+qty+'</span>' : '')
        + '<button class="qty-btn" onclick="changeQty('+m.id+',1)">+</button>'
        + '</div></div>';
    });
    html += '</div>';
  }
  document.getElementById('menu-list').innerHTML = html || '<div class="loading">Tidak ada menu</div>';
}

function changeQty(id, delta) {
  const m = allMenu.find(x => x.id == id); if (!m) return;
  if (!cart[id]) cart[id] = {menu:m, qty:0, varian:m.varian?.[0]||'', catatan:''};
  cart[id].qty = Math.max(0, cart[id].qty + delta);
  if (cart[id].qty === 0) delete cart[id];
  updateCartBar();
  const other = ['Aneka Kopi','Minuman Lain','Aneka Indomie','Menu Promo'];
  const items = activeKat===null ? allMenu : activeKat==='other' ? allMenu.filter(x=>!other.includes(x.kategori)) : allMenu.filter(x=>x.kategori===activeKat);
  renderMenu(items);
}

function updateVarian(id, val) { if(cart[id]) cart[id].varian = val; }
function updateCatatan(id, val) { if(cart[id]) cart[id].catatan = val; }
function fmt(n) { return Number(n).toLocaleString('id-ID'); }

function updateCartBar() {
  const items = Object.values(cart);
  const total = items.reduce((s,c) => { const h=Number(c.menu.harga_dingin||c.menu.harga_panas||0); return s+h*c.qty; }, 0);
  const count = items.reduce((s,c) => s+c.qty, 0);
  document.getElementById('cart-count').textContent = count + ' item';
  document.getElementById('cart-total').textContent = 'Rp ' + fmt(total);
  document.getElementById('cart-bar').classList.toggle('show', count>0);
}

function showPage(id, from) {
  prevPage = from || document.querySelector('.page.active')?.id || 'page-menu';
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}
function goBack() { showPage(prevPage); }

function goCheckout() {
  if (!Object.values(cart).length) return;
  let html = '<div class="checkout-card"><h3>Pesanan kamu</h3>';
  let total = 0;
  Object.values(cart).forEach(c => {
    const h = Number(c.menu.harga_dingin||c.menu.harga_panas||0);
    const sub = h * c.qty; total += sub;
    const det = [c.varian, c.catatan].filter(Boolean).join(' &middot; ');
    html += '<div class="checkout-item"><div><div class="checkout-item-name">'+c.menu.nama_menu+'</div>'+(det?'<div class="checkout-item-detail">'+det+'</div>':'')+'</div><div class="checkout-item-price">'+c.qty+'&times; Rp '+fmt(h)+'</div></div>';
  });
  html += '<div class="checkout-total"><span>Total</span><span>Rp '+fmt(total)+'</span></div></div>';
  document.getElementById('checkout-items').innerHTML = html;

  let sg = '';
  allStaff.forEach(s => {
    sg += '<div class="staff-card'+(s.online?'':' offline')+'" onclick="selectStaff(this,''+s.nama+'')">'
      + '<div class="staff-name">'+s.nama+'</div>'
      + '<div class="staff-status"><span class="dot '+(s.online?'green':'red')+'"></span><span>'+(s.online?'Jaga':'Tdk jaga')+'</span></div>'
      + '</div>';
  });
  document.getElementById('staff-grid').innerHTML = sg;
  selectedStaff = null;
  showPage('page-checkout', 'page-menu');
}

function selectStaff(el, nama) {
  document.querySelectorAll('.staff-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  selectedStaff = allStaff.find(s => s.nama === nama);
}

function kirimPesanan() {
  const nama = document.getElementById('nama-user').value.trim();
  if (!nama) { alert('Isi nama kamu dulu ya!'); return; }
  if (!selectedStaff) { alert('Pilih dulu mau kirim ke siapa!'); return; }
  const items = Object.values(cart);
  let lines = '', total = 0;
  items.forEach(c => {
    const h = Number(c.menu.harga_dingin||c.menu.harga_panas||0);
    total += h * c.qty;
    const ket = [c.varian, c.catatan].filter(Boolean).join(', ');
    lines += '• ' + c.menu.nama_menu + ' - ' + c.qty + ' - Rp ' + fmt(h) + (ket?' ('+ket+')':'') + '\n';
  });
  const pesan = '*Pesan Antar Khusus Pesantren IIQ:*\n\n' + lines + '\n*Total: Rp ' + fmt(total) + '*\n\nNama: ' + nama;
  const wa = 'https://wa.me/' + selectedStaff.nomor_wa + '?text=' + encodeURIComponent(pesan);
  try { fetch(GAS, {method:'POST', body:JSON.stringify({action:'logOrder', nama_user:nama, staff_tujuan:selectedStaff.nama, total_harga:total, detail_pesanan:lines})}); } catch(e) {}
  window.open(wa, '_blank');
}

init();
</script>
</body>
</html>
