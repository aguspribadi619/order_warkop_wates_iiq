<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - Warkop Sejagat</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f5f5;color:#1a1a1a}
.header{background:#1a5c2a;color:white;padding:14px 16px}
.header h1{font-size:16px;font-weight:600}
.header p{font-size:11px;opacity:0.75;margin-top:2px}
.section{padding:12px}
.section-label{font-size:10px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:4px}
.stat-card{background:white;border-radius:8px;padding:12px;text-align:center;border:1px solid #e8e8e8}
.stat-num{font-size:22px;font-weight:600;color:#1a5c2a}
.stat-lbl{font-size:11px;color:#888;margin-top:2px}
.staff-row{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:white;border:1px solid #e8e8e8;border-radius:8px;margin-bottom:6px}
.staff-info{display:flex;align-items:center;gap:10px}
.staff-name{font-size:14px;font-weight:500}
.staff-num{font-size:11px;color:#888}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot.green{background:#16a34a}.dot.red{background:#dc2626}
.toggle{position:relative;width:40px;height:22px;cursor:pointer;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.slider{position:absolute;top:0;left:0;right:0;bottom:0;background:#d1d5db;border-radius:22px;transition:.2s}
.slider:before{content:'';position:absolute;width:16px;height:16px;left:3px;bottom:3px;background:white;border-radius:50%;transition:.2s}
.toggle input:checked+.slider{background:#16a34a}
.toggle input:checked+.slider:before{transform:translateX(18px)}
.menu-row{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:white;border:1px solid #e8e8e8;border-radius:8px;margin-bottom:5px}
.menu-row-name{font-size:13px;font-weight:500}
.menu-row.habis .menu-row-name{color:#9ca3af}
.menu-row-kat{font-size:11px;color:#888}
.badge{font-size:10px;padding:2px 6px;border-radius:4px;margin-left:6px;vertical-align:middle}
.badge-ok{background:#dcfce7;color:#16a34a}
.badge-habis{background:#fee2e2;color:#dc2626}
.search-box{width:100%;padding:8px 12px;border:1px solid #e5e5e5;border-radius:8px;font-size:13px;background:white;color:#1a1a1a;margin-bottom:10px}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.filter-btn{padding:4px 12px;font-size:11px;border:1px solid #e5e5e5;border-radius:6px;cursor:pointer;background:white;color:#666}
.filter-btn.active{background:#1a5c2a;color:white;border-color:#1a5c2a}
.loading{text-align:center;padding:24px;color:#888;font-size:13px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:white;padding:8px 18px;border-radius:8px;font-size:13px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:99;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="header">
  <h1>⚙️ Admin Panel</h1>
  <p>Warkop Sejagat — kelola menu & status karyawan</p>
</div>

<div class="section">
  <div class="section-label">Statistik</div>
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-num" id="s-total">—</div><div class="stat-lbl">Total menu</div></div>
    <div class="stat-card"><div class="stat-num" id="s-ada">—</div><div class="stat-lbl">Tersedia</div></div>
    <div class="stat-card"><div class="stat-num" id="s-habis">—</div><div class="stat-lbl">Habis</div></div>
  </div>
</div>

<div class="section">
  <div class="section-label">Status karyawan</div>
  <div id="staff-list"><div class="loading">Memuat...</div></div>
</div>

<div class="section">
  <div class="section-label">Ketersediaan menu</div>
  <input class="search-box" placeholder="Cari nama menu..." oninput="searchMenu(this.value)">
  <div class="filter-row" id="kat-filter"></div>
  <div id="menu-list"><div class="loading">Memuat...</div></div>
</div>

<div class="toast" id="toast"></div>

<script>
const GAS = 'https://script.google.com/macros/s/AKfycbzFhpSpDuQmz2QpfPHHOsKNWeDnA1QTRTFPT72UXk2S6IAdId3gTnr08C1Zt-dpVdDN/exec';
let allMenu=[], allStaff=[], activeKat=null, searchQ='';

function jsonp(action) {
  return new Promise((resolve, reject) => {
    const cb = 'cb_' + Date.now() + Math.floor(Math.random()*9999);
    const script = document.createElement('script');
    window[cb] = function(data) { delete window[cb]; document.body.removeChild(script); resolve(data); };
    script.onerror = () => { delete window[cb]; document.body.removeChild(script); reject(new Error('Gagal')); };
    script.src = GAS + '?action=' + action + '&callback=' + cb;
    document.body.appendChild(script);
  });
}

async function init() {
  try {
    const [m,s] = await Promise.all([jsonp('getMenu'), jsonp('getStaff')]);
    allMenu=m; allStaff=s;
    renderStaff(); renderKatFilter(); renderMenu(); updateStats();
  } catch(e) {
    document.getElementById('menu-list').innerHTML='<div class="loading" style="color:#dc2626">Gagal memuat: '+e.message+'</div>';
  }
}

function updateStats() {
  document.getElementById('s-total').textContent = allMenu.length;
  const ada = allMenu.filter(m=>m.tersedia).length;
  document.getElementById('s-ada').textContent = ada;
  document.getElementById('s-habis').textContent = allMenu.length - ada;
}

function renderStaff() {
  document.getElementById('staff-list').innerHTML = allStaff.map(s =>
    '<div class="staff-row"><div class="staff-info"><span class="dot '+(s.online?'green':'red')+'"></span><div><div class="staff-name">'+s.nama+'</div><div class="staff-num">'+s.nomor_wa+'</div></div></div>'
    +'<label class="toggle"><input type="checkbox" '+(s.online?'checked':'')+' onchange="toggleStaff(''+s.nama+'',this.checked)"><span class="slider"></span></label></div>'
  ).join('');
}

async function toggleStaff(nama, online) {
  const s = allStaff.find(x=>x.nama===nama); if(s) s.online=online;
  renderStaff();
  showToast(nama+' → '+(online?'Online ✓':'Offline'));
  try { await fetch(GAS, {method:'POST', body:JSON.stringify({action:'updateStaff',nama,online})}); }
  catch(e) { showToast('Gagal simpan!'); if(s) s.online=!online; renderStaff(); }
}

function renderKatFilter() {
  const kats = [...new Set(allMenu.map(m=>m.kategori))];
  document.getElementById('kat-filter').innerHTML =
    '<button class="filter-btn active" onclick="setKat(null,this)">Semua</button>'
    + kats.map(k=>'<button class="filter-btn" onclick="setKat(''+k+'',this)">'+k+'</button>').join('');
}

function setKat(kat, el) {
  activeKat=kat;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderMenu();
}

function searchMenu(q) { searchQ=q.toLowerCase(); renderMenu(); }

function renderMenu() {
  let items = allMenu;
  if (activeKat) items = items.filter(m=>m.kategori===activeKat);
  if (searchQ) items = items.filter(m=>m.nama_menu.toLowerCase().includes(searchQ));
  if (!items.length) { document.getElementById('menu-list').innerHTML='<div class="loading">Tidak ditemukan</div>'; return; }
  const fmt = n => Number(n).toLocaleString('id-ID');
  document.getElementById('menu-list').innerHTML = items.map(m => {
    const h = m.harga_dingin||m.harga_panas||0;
    return '<div class="menu-row'+(m.tersedia?'':' habis')+'">'
      +'<div><div class="menu-row-name">'+m.nama_menu+'<span class="badge '+(m.tersedia?'badge-ok':'badge-habis')+'">'+(m.tersedia?'Ada':'Habis')+'</span></div>'
      +'<div class="menu-row-kat">'+m.kategori+' &middot; Rp '+fmt(h)+'</div></div>'
      +'<label class="toggle"><input type="checkbox" '+(m.tersedia?'checked':'')+' onchange="toggleMenu('+m.id+',this.checked)"><span class="slider"></span></label>'
      +'</div>';
  }).join('');
}

async function toggleMenu(id, tersedia) {
  const m = allMenu.find(x=>x.id==id); if(m) m.tersedia=tersedia;
  renderMenu(); updateStats();
  showToast((m?.nama_menu||'Menu')+' → '+(tersedia?'Tersedia ✓':'Habis'));
  try { await fetch(GAS, {method:'POST', body:JSON.stringify({action:'updateMenu',id,tersedia})}); }
  catch(e) { showToast('Gagal simpan!'); if(m) m.tersedia=!tersedia; renderMenu(); updateStats(); }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2000);
}

init();
</script>
</body>
</html>
