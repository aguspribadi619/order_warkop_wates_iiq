<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin Warkop Sejagat</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f5f5;color:#1a1a1a}
.header{background:#1a5c2a;color:white;padding:16px;text-align:center}
.header h1{font-size:18px}
.header p{font-size:12px;opacity:.85;margin-top:2px}
.section{padding:12px}
.label{font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.staff-row{display:flex;align-items:center;justify-content:space-between;background:white;border:1px solid #e8e8e8;border-radius:10px;padding:12px;margin-bottom:8px}
.staff-left{display:flex;align-items:center;gap:10px}
.dot{width:10px;height:10px;border-radius:50%;background:#dc2626}
.dot.green{background:#16a34a}
.name{font-size:14px;font-weight:700}
.wa{font-size:11px;color:#888;margin-top:2px}
.status{font-size:11px;margin-top:4px}
.status.on{color:#16a34a}
.status.off{color:#dc2626}
.toggle{position:relative;width:44px;height:24px;cursor:pointer}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.slider{position:absolute;top:0;left:0;right:0;bottom:0;background:#d1d5db;border-radius:24px;transition:.2s}
.slider:before{content:'';position:absolute;width:18px;height:18px;left:3px;bottom:3px;background:white;border-radius:50%;transition:.2s}
.toggle input:checked+.slider{background:#16a34a}
.toggle input:checked+.slider:before{transform:translateX(20px)}
.loading{text-align:center;padding:30px;color:#888;font-size:13px}
.note{font-size:12px;color:#666;background:white;border:1px solid #e8e8e8;border-radius:10px;padding:12px;line-height:1.5}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#111;color:white;padding:9px 16px;border-radius:8px;font-size:13px;opacity:0;pointer-events:none;transition:.2s;z-index:50;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>

<body>

<div class="header">
  <h1>Admin Panel</h1>
  <p>Atur siapa yang sedang jaga / online</p>
</div>

<div class="section">
  <div class="label">Status Staff</div>
  <div id="staff-list">
    <div class="loading">Memuat staff...</div>
  </div>
</div>

<div class="section">
  <div class="note">
    Staff yang ON akan muncul sebagai pilihan tujuan WhatsApp di halaman customer. Boleh lebih dari satu orang ON, misalnya Apad dan Admin.
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const GAS = 'https://script.google.com/macros/s/AKfycbzFhpSpDuQmz2QpfPHHOsKNWeDnA1QTRTFPT72UXk2S6IAdId3gTnr08C1Zt-dpVdDN/exec';

let allStaff = [];

function escapeText(v) {
  return String(v ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function jsonp(action, params = {}) {
  return new Promise((resolve, reject) => {
    const cb = 'cb_' + Date.now() + Math.floor(Math.random() * 9999);
    const script = document.createElement('script');

    window[cb] = function(data) {
      delete window[cb];
      if (script.parentNode) document.body.removeChild(script);
      resolve(data);
    };

    script.onerror = function() {
      delete window[cb];
      if (script.parentNode) document.body.removeChild(script);
      reject(new Error('Gagal menghubungi server'));
    };

    const q = new URLSearchParams({
      action,
      callback: cb,
      ...params
    });

    script.src = GAS + '?' + q.toString();
    document.body.appendChild(script);
  });
}

async function init() {
  const box = document.getElementById('staff-list');
  box.innerHTML = '<div class="loading">Memuat staff...</div>';

  try {
    const data = await jsonp('getStaff');
    allStaff = Array.isArray(data) ? data : [];
    renderStaff();

  } catch (e) {
    box.innerHTML = '<div class="loading" style="color:#dc2626">Gagal memuat staff</div>';
  }
}

function renderStaff() {
  const box = document.getElementById('staff-list');

  if (!allStaff.length) {
    box.innerHTML = '<div class="loading">Belum ada data staff</div>';
    return;
  }

  box.innerHTML = allStaff.map((s, idx) => `
    <div class="staff-row">
      <div class="staff-left">
        <span class="dot ${s.online ? 'green' : ''}"></span>
        <div>
          <div class="name">${escapeText(s.nama)}</div>
          <div class="wa">${escapeText(s.nomor_wa)}</div>
          <div class="status ${s.online ? 'on' : 'off'}">${s.online ? 'Online' : 'Offline'}</div>
        </div>
      </div>

      <label class="toggle">
        <input type="checkbox" ${s.online ? 'checked' : ''} onchange="toggleStaff(${idx}, this.checked)">
        <span class="slider"></span>
      </label>
    </div>
  `).join('');
}

async function toggleStaff(idx, online) {
  const staff = allStaff[idx];
  const old = staff.online;

  staff.online = online;
  renderStaff();

  showToast(staff.nama + ' → ' + (online ? 'Online' : 'Offline'));

  try {
    const res = await jsonp('updateStaff', {
      nama: staff.nama,
      online: online ? 'true' : 'false'
    });

    if (!res.success) {
      throw new Error(res.error || 'Gagal update');
    }

  } catch (e) {
    staff.online = old;
    renderStaff();
    showToast('Gagal simpan status');
  }
}

init();
</script>

</body>
</html>
